name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: shellcheck (warning 以上を fail に)
        run: shellcheck --severity=warning provision.sh
      - name: bash -n
        run: bash -n provision.sh
